<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link rel="stylesheet" href="app.css">
    <script src="app.js"></script>

</head>
<body>
    <div class="calculator">
        <h1>CALCULATOR</h1>
        <input type="text" id="display" placeholder="0">
        <div class="buttons">
            <button onclick="cleardisplay()">ac</button>
            <button onclick="apendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="apendValue('/')">/</button> 
            <button onclick="apendValue('4')">4</button>
             <button onclick="apendValue('5')">5</button>
              <button onclick="apendValue('6')">6</button>
               <button onclick="apendValue('*')">*</button>
                <button onclick="apendValue('1')">1</button>
                 <button onclick="apendValue('2')">2</button>
                 <button onclick="apendValue('3')">3</button>
             <button onclick="apendValue('-')">-</button>
              <button onclick="apendValue('0')">0</button> 
          <button onclick="calculate()">=</button>
          <button onclick="apendValue('+')">+</button>
                   
        </div>
    </div>
    <script src="app.js"></script>


</body>
</html>
